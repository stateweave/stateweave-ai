services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      STATEWEAVE_MODEL_PROVIDER: ${STATEWEAVE_MODEL_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-4096}
      ANTHROPIC_TEMPERATURE: ${ANTHROPIC_TEMPERATURE:-0}
      ANTHROPIC_TIMEOUT_MS: ${ANTHROPIC_TIMEOUT_MS:-180000}
      ANTHROPIC_SYSTEM: ${ANTHROPIC_SYSTEM:-}
    expose:
      - "3000"
